<!DOCTYPE html>
<html>
<head>
    <title>Ticket Pricing of the Concert</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        .box {
            width: 60%;
            margin: auto;
            background: #222;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px #000;
        }

        h1 {
            color: #00ffd5;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            border: 1px solid #444;
        }

        th {
            background: #333;
            color: #00ffd5;
        }

        td {
            background: #1a1a1a;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Ticket Pricing of the Concert</h1>

    <table>
        <tr>
            <th>Ticket (Section)</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>VIP</td>
            <td>₱700</td>
        </tr>
        <tr>
            <td>Lower Box</td>
            <td>₱500</td>
        </tr>
        <tr>
            <td>Upper Box</td>
            <td>₱300</td>
        </tr>
        <tr>
            <td>General Admission</td>
            <td>₱150</td>
        </tr>
    </table>
</div>

</body>
</html>
